# Example parameter-aware homing override for a Cartesian CNC.
#
# This example matches a machine where Z homes at its upper limit. X and Y
# remain independently selectable, but Z is homed first when its position
# is unknown or below the configured safe height.
#
# Expected behavior:
#   G28       -> Z, X, release X, Y, then release Y
#   G28 X     -> ensure safe Z, then X
#   G28 Z     -> Z only
#   G28 Y     -> ensure safe Z, then Y
#   G28 X Y   -> ensure safe Z, then X and Y
#
# G28 commands inside [homing_override] invoke Klipper's native homing
# implementation; they do not recursively call this override.

[homing_override]
axes: xyz
gcode:
    {% set home_x = 'X' in params %}
    {% set home_y = 'Y' in params %}
    {% set home_z = 'Z' in params %}
    {% set home_all = not (home_x or home_y or home_z) %}
    {% set clearance_from_top = 10.0 %}
    {% set safe_z = printer.toolhead.axis_maximum.z|float - clearance_from_top %}
    {% set x_clearance = 5.0 %}
    {% set y_clearance = 5.0 %}
    {% set clearance_speed = 20.0 * 60 %}

    {% if home_all %}
        G28 Z
        G28 X

        G91
        G0 X{x_clearance} F{clearance_speed}
        G90

        G28 Y

        G91
        G0 Y-{y_clearance} F{clearance_speed}
        G90
    {% else %}
        {% if home_z and not (home_x or home_y) %}
            G28 Z
        {% endif %}

        {% if home_x or home_y %}
            {% if home_z or "z" not in printer.toolhead.homed_axes or printer.toolhead.position.z|float < safe_z %}
                G28 Z
            {% endif %}
        {% endif %}

        {% if home_x %}
            G28 X
        {% endif %}

        {% if home_y %}
            G28 Y
        {% endif %}
    {% endif %}
