# Example Fusion 360 job boundary macros for Klipper CNC.
#
# Include cnc_pause_resume.cfg before this file because END_PRINT reuses its
# machine-coordinate park helpers.
#
# The bundled Fusion post processor calls START_PRINT once per G-code file:
#
#   START_PRINT X=min,max Y=min,max Z=min,max
#
# Bounds are expressed in the active work coordinate system. START_PRINT
# transforms them to machine coordinates and rejects jobs outside the machine.

[gcode_macro START_PRINT]
description: Validate Fusion CNC job bounds before motion starts
gcode:
    {% set required = "xyz" %}
    {% set homed = printer.toolhead.homed_axes %}
    {% set active_wcs = printer.work_coordinate_systems.active_wcs|default("G54") %}
    {% set x_values = params.X.split(",") if params.X is defined else [] %}
    {% set y_values = params.Y.split(",") if params.Y is defined else [] %}
    {% set z_values = params.Z.split(",") if params.Z is defined else [] %}
    {% if required not in homed %}
        {action_raise_error("START_PRINT rejected: home XYZ first")}
    {% elif x_values|length != 2 or y_values|length != 2 or z_values|length != 2 %}
        {action_raise_error("START_PRINT requires X=min,max Y=min,max Z=min,max")}
    {% else %}
        {% set gcode_position = printer.gcode_move.gcode_position %}
        {% set machine_position = printer.gcode_move.position %}
        {% set offset_x = machine_position.x|float - gcode_position.x|float %}
        {% set offset_y = machine_position.y|float - gcode_position.y|float %}
        {% set offset_z = machine_position.z|float - gcode_position.z|float %}
        {% set x_min = x_values[0]|float + offset_x %}
        {% set x_max = x_values[1]|float + offset_x %}
        {% set y_min = y_values[0]|float + offset_y %}
        {% set y_max = y_values[1]|float + offset_y %}
        {% set z_min = z_values[0]|float + offset_z %}
        {% set z_max = z_values[1]|float + offset_z %}
        {% set axis_min = printer.toolhead.axis_minimum %}
        {% set axis_max = printer.toolhead.axis_maximum %}
        {% if x_min < axis_min.x|float or x_max > axis_max.x|float %}
            {action_raise_error("START_PRINT rejected: X range exceeds machine limits")}
        {% elif y_min < axis_min.y|float or y_max > axis_max.y|float %}
            {action_raise_error("START_PRINT rejected: Y range exceeds machine limits")}
        {% elif z_min < axis_min.z|float or z_max > axis_max.z|float %}
            {action_raise_error("START_PRINT rejected: Z range exceeds machine limits")}
        {% else %}
            G21
            G90
            RESPOND TYPE=echo MSG="Job valid in {active_wcs}: X{x_values[0]}..{x_values[1]} Y{y_values[0]}..{y_values[1]} Z{z_values[0]}..{z_values[1]}"
        {% endif %}
    {% endif %}

[gcode_macro END_PRINT]
description: Finish a CNC job, stop the spindle, and park safely
gcode:
    M400
    {% if "z" in printer.toolhead.homed_axes %}
        _CNC_CANCEL_RAISE
        M400
    {% endif %}
    M5
    {% if "x" in printer.toolhead.homed_axes and "y" in printer.toolhead.homed_axes and "z" in printer.toolhead.homed_axes %}
        _CNC_CANCEL_PARK_XY
    {% else %}
        RESPOND TYPE=echo MSG="XY park skipped: machine is not fully homed"
    {% endif %}
    RESPOND TYPE=echo MSG="CNC job complete"
