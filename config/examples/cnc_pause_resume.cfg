# Example CNC pause, resume, and cancel macros for Klipper.
#
# This file replaces mainsail.cfg for the CNC job-control workflow.
# Remove the following line from printer.cfg before including this file:
#
#   [include mainsail.cfg]
#
# Requirements outside this file:
#   [respond]
#
#   [work_coordinate_systems]
#
#   [output_pin spindle]
#   ...
#
#   M3 and M5 macros that control [output_pin spindle].

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[pause_resume]
recover_velocity: 20.0

[display_status]

[gcode_macro PAUSE]
description: Pause a CNC job, stop the spindle, and lift Z
rename_existing: PAUSE_BASE
variable_z_lift: 5.0
variable_z_lift_speed: 10.0
gcode:
    {% if printer.pause_resume.is_paused %}
        RESPOND TYPE=echo MSG="CNC job is already paused"
    {% else %}
        # Stop file motion and save Klipper's PAUSE_STATE at the cutting
        # position. Retract Z while the spindle is still running, then stop it.
        PAUSE_BASE

        {% if "z" in printer.toolhead.homed_axes %}
            {% set current_z = printer.toolhead.position.z|float %}
            {% set max_z = printer.toolhead.axis_maximum.z|float %}
            {% set requested = printer["gcode_macro PAUSE"].z_lift|float %}
            {% set lift = [requested, max_z - current_z]|min %}

            {% if lift > 0 %}
                SAVE_GCODE_STATE NAME=CNC_PAUSE_PARK
                G91
                G0 Z{lift} F{printer["gcode_macro PAUSE"].z_lift_speed|float * 60}
                RESTORE_GCODE_STATE NAME=CNC_PAUSE_PARK MOVE=0
            {% endif %}
        {% endif %}

        M400
        M5
        RESPOND TYPE=echo MSG="Paused: spindle stopped. Start spindle manually before RESUME."
    {% endif %}

[gcode_macro RESUME]
description: Resume a paused CNC job after the spindle is running
rename_existing: RESUME_BASE
variable_recover_speed: 20.0
gcode:
    {% if not printer.pause_resume.is_paused %}
        RESPOND TYPE=error MSG="CNC job is not paused"
    {% elif printer["output_pin spindle"].value|float <= 0 %}
        RESPOND TYPE=error MSG="Start the spindle before RESUME"
    {% else %}
        # RESUME_BASE returns to Klipper's saved PAUSE_STATE and then
        # continues the virtual SD job.
        RESUME_BASE VELOCITY={printer["gcode_macro RESUME"].recover_speed|float}
    {% endif %}

[gcode_macro CANCEL_PRINT]
description: Cancel a CNC job, stop the spindle, and park safely
rename_existing: CANCEL_PRINT_BASE
gcode:
    {% set was_paused = printer.pause_resume.is_paused %}

    # Stop virtual SD motion before moving away from the cut.
    {% if printer.virtual_sdcard.is_active and not was_paused %}
        PAUSE_BASE
    {% endif %}

    # Retract toward the upper Z limit while the spindle is still running.
    {% if "z" in printer.toolhead.homed_axes %}
        _CNC_CANCEL_RAISE
    {% endif %}

    M400
    M5

    # Park XY only after the spindle has stopped.
    {% if "x" in printer.toolhead.homed_axes and "y" in printer.toolhead.homed_axes and "z" in printer.toolhead.homed_axes %}
        _CNC_CANCEL_PARK_XY
    {% else %}
        RESPOND TYPE=echo MSG="XY park skipped: machine is not fully homed"
    {% endif %}

    CANCEL_PRINT_BASE

[gcode_macro _CNC_CANCEL_RAISE]
description: Internal CNC cancel Z retract in machine coordinates
variable_clearance_from_top: 5.0
variable_speed_z: 10.0
gcode:
    {% set active_wcs = printer.work_coordinate_systems.active_wcs|default("G54") %}
    {% set park_z = printer.toolhead.axis_maximum.z|float - printer["gcode_macro _CNC_CANCEL_RAISE"].clearance_from_top|float %}

    SAVE_GCODE_STATE NAME=CNC_CANCEL_RAISE_STATE
    G90
    G53
    G0 Z{park_z} F{printer["gcode_macro _CNC_CANCEL_RAISE"].speed_z|float * 60}
    {active_wcs}
    RESTORE_GCODE_STATE NAME=CNC_CANCEL_RAISE_STATE MOVE=0

[gcode_macro _CNC_CANCEL_PARK_XY]
description: Internal CNC cancel XY park in machine coordinates
variable_park_x_from_min: 5.0
variable_park_y_from_max: 5.0
variable_speed_xy: 20.0
gcode:
    {% set active_wcs = printer.work_coordinate_systems.active_wcs|default("G54") %}
    {% set park_x = printer.toolhead.axis_minimum.x|float + printer["gcode_macro _CNC_CANCEL_PARK_XY"].park_x_from_min|float %}
    {% set park_y = printer.toolhead.axis_maximum.y|float - printer["gcode_macro _CNC_CANCEL_PARK_XY"].park_y_from_max|float %}

    SAVE_GCODE_STATE NAME=CNC_CANCEL_XY_STATE
    G90
    G53
    G0 X{park_x} Y{park_y} F{printer["gcode_macro _CNC_CANCEL_PARK_XY"].speed_xy|float * 60}
    {active_wcs}
    RESTORE_GCODE_STATE NAME=CNC_CANCEL_XY_STATE MOVE=0
