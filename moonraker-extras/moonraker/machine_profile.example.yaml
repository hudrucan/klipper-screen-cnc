name: cnc
frontend:
  show_machine_coords: true
  show_work_coords: true
  show_machine_health: true
capabilities:
  spindle:
    enabled: true
    mode: relay
    variable_speed: false
  coolant:
    channels: 0
  probe:
    enabled: true
  tool_setter:
    enabled: true
safety:
  require_confirm_for_zero_reset: true
  require_confirm_for_spindle_start: true
  require_homing_before_offsets: true
