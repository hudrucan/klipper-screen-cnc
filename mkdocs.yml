site_name: Klipper Screen CNC
site_description: CNC-focused touchscreen UI for Klipper.
nav:
    - Home: index.md
    - Installation: installation.md
    - CNC Controls: controls.md
    - Migration Notes: migration.md
    - Development: development.md
theme:
  name: material
  language: en
  features:
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - scheme: slate
      primary: deep purple

plugins:
    - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details

extra:
    social:
      - icon: fontawesome/brands/python
