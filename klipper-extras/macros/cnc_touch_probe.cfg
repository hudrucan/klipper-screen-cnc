# Example CNC touch-probe macros for Klipper.
#
# These wrappers are intentionally thin. They call the guarded commands from
# [touch_probe] and are meant to appear as simple buttons in KlipperScreen's
# macro UI.
#
# Requirements:
#   [touch_probe]
#   [work_coordinate_systems]
#   [respond]
#
# Direction note:
#   FIND_EDGE_X_NEG / Y_NEG moves toward machine negative.
#   FIND_EDGE_X_POS / Y_POS moves toward machine positive.
#   The stock min/max wrappers below assume the probe starts outside the
#   target edge and moves inward until it touches the stock.

[gcode_macro CHECK_TOUCH_PROBE]
description: Report touch probe input state
gcode:
    QUERY_TOUCH_PROBE

[gcode_macro PROBE_STOCK_Z]
description: Probe stock surface with the touch probe and set active WCS Z0
gcode:
    FIND_SURFACE_Z SET_ZERO=1

[gcode_macro FIND_STOCK_X_MIN]
description: Start outside X-min, probe toward X+, and set active WCS X0
gcode:
    FIND_EDGE_X_POS SET_ZERO=1

[gcode_macro FIND_STOCK_X_MAX]
description: Start outside X-max, probe toward X-, and set active WCS X0
gcode:
    FIND_EDGE_X_NEG SET_ZERO=1

[gcode_macro FIND_STOCK_Y_MIN]
description: Start outside Y-min, probe toward Y+, and set active WCS Y0
gcode:
    FIND_EDGE_Y_POS SET_ZERO=1

[gcode_macro FIND_STOCK_Y_MAX]
description: Start outside Y-max, probe toward Y-, and set active WCS Y0
gcode:
    FIND_EDGE_Y_NEG SET_ZERO=1

[gcode_macro CENTER_STOCK_X]
description: Probe both X edges and set active WCS X0 at stock center
gcode:
    {% set fallback = printer.toolhead.axis_maximum.x|float - printer.toolhead.axis_minimum.x|float %}
    {% set distance = params.DISTANCE|default(fallback)|float %}
    FIND_CENTER_X DISTANCE={distance} SET_ZERO=1

[gcode_macro CENTER_STOCK_Y]
description: Probe both Y edges and set active WCS Y0 at stock center
gcode:
    {% set fallback = printer.toolhead.axis_maximum.y|float - printer.toolhead.axis_minimum.y|float %}
    {% set distance = params.DISTANCE|default(fallback)|float %}
    FIND_CENTER_Y DISTANCE={distance} SET_ZERO=1

[gcode_macro CENTER_STOCK_XY]
description: Probe X and Y edges and set active WCS XY0 at stock center
gcode:
    {% set fallback_x = printer.toolhead.axis_maximum.x|float - printer.toolhead.axis_minimum.x|float %}
    {% set fallback_y = printer.toolhead.axis_maximum.y|float - printer.toolhead.axis_minimum.y|float %}
    {% set distance_x = params.DISTANCE_X|default(fallback_x)|float %}
    {% set distance_y = params.DISTANCE_Y|default(fallback_y)|float %}
    FIND_CENTER_XY DISTANCE_X={distance_x} DISTANCE_Y={distance_y} SET_ZERO=1

[gcode_macro PROBE_BORE_CENTER]
description: Probe a bore and set active WCS XY0 at its center
gcode:
    PROBE_BORE SET_ZERO=1
