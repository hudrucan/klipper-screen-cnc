#
# DO NOT EDIT THIS FILE USE klipper_screen.conf
#

[menu __main]
name: {{ gettext('CNC') }}

[menu __main move]
name: {{ gettext('Jog') }}
icon: move
panel: move

[menu __main dro]
name: DRO
icon: fine-tune
panel: dro

[menu __main wcs]
name: WCS
icon: hashtag
panel: wcs
enable: {{ 'work_coordinate_systems' in printer.config_sections }}

[menu __main spindle]
name: Spindle
icon: fan-on
panel: spindle
enable: {{ 'M3' in printer.available_commands and 'M5' in printer.available_commands and 'output_pin spindle' in printer.config_sections }}

[menu __main cnc_status]
name: CNC Status
icon: info
panel: cnc_status

[menu __main gcodes]
name: {{ gettext('Files') }}
icon: files
panel: gcodes

[menu __main console]
name: MDI
icon: console
panel: console

[menu __main more]
name: {{ gettext('More') }}
icon: settings

[menu __main more macros]
name: {{ gettext('Macros') }}
icon: custom-script
panel: gcode_macros
enable: {{ printer.gcode_macros.count > 0 }}

[menu __main more temperature]
name: {{ gettext('Temperature') }}
icon: heat-up
panel: temperature
enable: {{ printer.temperature_devices.count > 0 }}

[menu __main more limits]
name: {{ gettext('Limits') }}
icon: fine-tune
panel: limits

[menu __main more fan]
name: {{ gettext('Fan') }}
icon: fan
panel: fan
enable: {{ printer.fans.count > 0 }}

[menu __main more pins]
name: {{ gettext('Pins') }}
icon: hashtag
panel: pins
enable: {{ printer.output_pins.count > 0 or printer.pwm_tools.count > 0 }}

[menu __main more power]
name: {{ gettext('Power') }}
icon: shutdown
panel: power
enable: {{ moonraker.power_devices.count > 0 }}

[menu __main more led]
name: {{ gettext('Leds') }}
icon: light
panel: led
enable: {{ printer.leds.count > 0 }}

[menu __main more camera]
name: {{ gettext('Camera') }}
icon: camera
panel: camera
enable: {{ moonraker.cameras.count > 0 }}

[menu __main more updater]
name: {{ gettext('Update') }}
icon: refresh
panel: updater

[menu __main more save]
name: {{ gettext('Save Config') }}
icon: complete
method: ks_confirm_save

[menu __main more settings]
name: Klipper Screen CNC
icon: settings
panel: settings

[menu __main more network]
name: {{ gettext('Network') }}
icon: network
panel: network

[menu __main more notifications]
name: {{ gettext('Notifications') }}
icon: notifications
panel: notifications

[menu __main more system]
name: {{ gettext('System') }}
icon: info
panel: system
enable: {{ moonraker_connected }}
