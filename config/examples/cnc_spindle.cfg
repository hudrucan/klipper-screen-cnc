# Example guarded spindle macros for Klipper CNC.
#
# Use this when the touch probe has a wire or clip that must be removed before
# the spindle can safely rotate. The guard is active only when [touch_probe] is
# configured. Machines without [touch_probe] can still use these spindle macros.
#
# Requirements:
#   [respond]
#   [output_pin spindle]
#   [touch_probe] optional, but required for probe-wire guarding
#
# The default S scale treats M3 S1000 as full power. Fusion-generated spindle
# RPM values above S1000 are clamped to full power. Adjust s_scale if your
# spindle output expects a different convention.

[gcode_macro _CNC_TOUCH_PROBE_READY]
description: Internal guard that blocks spindle start while the touch probe is active
gcode:
    {% if printer.touch_probe is defined and printer.touch_probe.triggered %}
        SET_PIN PIN=spindle VALUE=0
        {action_raise_error("Touch probe is triggered. Remove the probe wire before starting the spindle.")}
    {% endif %}

[gcode_macro M3]
description: Start spindle clockwise after touch-probe safety check
variable_default_s: 1000.0
variable_s_scale: 1000.0
variable_max_power: 1.0
gcode:
    _CNC_TOUCH_PROBE_READY
    {% set raw_s = params.S|default(printer["gcode_macro M3"].default_s)|float %}
    {% set scale = printer["gcode_macro M3"].s_scale|float %}
    {% set max_power = printer["gcode_macro M3"].max_power|float %}
    {% set power = [raw_s / scale, max_power]|min %}
    {% set power = [power, 0.0]|max %}
    SET_PIN PIN=spindle VALUE={power}
    RESPOND TYPE=echo MSG="Spindle on: M3 S{raw_s|round(3)}"

[gcode_macro M5]
description: Stop spindle
gcode:
    SET_PIN PIN=spindle VALUE=0
    RESPOND TYPE=echo MSG="Spindle stopped"

# Optional M4 example for machines with a separate reverse-control output:
#
# [output_pin spindle_reverse]
# pin: <your reverse pin>
# value: 0
# shutdown_value: 0
#
# [gcode_macro M4]
# description: Start spindle counter-clockwise after touch-probe safety check
# variable_default_s: 1000.0
# variable_s_scale: 1000.0
# variable_max_power: 1.0
