# Example CNC fixed tool-setter macros for Klipper.
#
# These wrappers call the guarded commands from [tool_setter]. Keep the dry-run
# and apply actions separate so a touchscreen tap does not silently change WCS Z.
#
# Requirements:
#   [tool_setter]
#   [work_coordinate_systems]
#   [respond]

[gcode_macro CHECK_TOOL_SETTER]
description: Report fixed tool setter input and calibration state
gcode:
    QUERY_TOOL_SETTER

[gcode_macro CHECK_SETTER_ACCURACY]
description: Probe the fixed tool setter repeatedly and report repeatability
variable_samples: 10
gcode:
    {% set samples = params.SAMPLES|default(printer["gcode_macro CHECK_SETTER_ACCURACY"].samples)|int %}
    TOOL_SETTER_ACCURACY SAMPLES={samples}

[gcode_macro CALIBRATE_TOOL_SETTER_Z]
description: Measure fixed setter after stock Z0 is set with the touch probe
gcode:
    CALIBRATE_SETTER_Z

[gcode_macro CHECK_BIT_Z]
description: Measure current bit on the fixed setter and report the WCS Z change
gcode:
    SET_BIT_Z

[gcode_macro APPLY_BIT_Z]
description: Measure current bit on the fixed setter and update active WCS Z
gcode:
    SET_BIT_Z APPLY=1
